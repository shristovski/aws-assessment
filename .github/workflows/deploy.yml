name: terraform-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend in CI)
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Static security scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true
          soft_fail: true

      - name: Terraform plan (dry run)
        working-directory: infra
        run: |
          echo "Generating Terraform plan (dry run)."
          echo "Note: This workflow does not configure AWS credentials; the plan may not fully evaluate in CI."
          terraform plan -no-color -out=tfplan || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/tfplan
          if-no-files-found: ignore

      - name: Post-deploy integration tests (placeholder)
        run: |
          echo "Post-deployment test stage placeholder."
          echo "In a deployment workflow, this job would run after 'terraform apply' with AWS credentials configured."
          echo "Expected actions:"
          echo "  - Authenticate to Cognito to obtain a JWT"
          echo "  - Call /greet and /dispatch endpoints in both regions concurrently"
          echo "  - Assert the returned region matches and print latency metrics"
          echo ""
          echo "Example commands:"
          echo "  pip install -r tests/requirements.txt"
          echo "  python tests/run_test.py"